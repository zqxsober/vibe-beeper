*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;color:#c8d6a0;font-family:monospace;padding:20px}
h1{color:#c8d6a0;margin-bottom:8px;font-size:18px}
h2.section{color:#fff;font-size:16px;margin:32px 0 6px;padding-bottom:6px;border-bottom:1px solid #333}
h2.section:first-of-type{margin-top:16px}
p.ctx{color:#777;font-size:11px;margin-bottom:16px}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;max-width:1200px;margin-bottom:32px}
.card{background:#2a2a2a;border-radius:10px;padding:12px;border:2px solid #3a3a3a}
.card h3{font-size:11px;margin-bottom:2px;color:#fff}
.card .sub{font-size:9px;color:#888;margin-bottom:8px;line-height:1.4}
.lcd{background:#b8c878;border-radius:6px;padding:8px;display:flex;align-items:center;gap:6px;min-height:60px}
canvas{image-rendering:pixelated;flex-shrink:0}
.lt{flex:1}.lt .t{font-size:11px;font-weight:900;color:#4a5a28}
.lt .d{font-size:7px;color:#4a5a28;opacity:.7;margin-top:1px}
.fi{font-size:8px;color:#555;margin-top:4px;text-align:center}
.ctrls{margin-top:4px;display:flex;gap:4px;justify-content:center}
.ctrls button{background:#3a3a3a;border:1px solid #555;color:#ccc;padding:2px 6px;border-radius:3px;cursor:pointer;font-size:9px}
.ctrls button:hover{background:#4a4a4a}
.ctrls button.on{background:#5a7a2a;border-color:#7a9a3a}
</style>
</head>

/* ---- Rendering ---- */
var content = document.getElementById("content");
var allAnimations = [];

STATES.forEach(function(state, si) {
  var h2 = document.createElement("h2");
  h2.className = "section";
  h2.textContent = (si+1) + ". " + state.name;
  content.appendChild(h2);

  var p = document.createElement("p");
  p.className = "ctx";
  p.textContent = state.desc;
  content.appendChild(p);

  for (var rowStart = 0; rowStart < 10; rowStart += 5) {
    var row = document.createElement("div");
    row.className = "row";
    for (var ai = rowStart; ai < rowStart + 5 && ai < state.alts.length; ai++) {
      var alt = state.alts[ai];
      var card = document.createElement("div");
      card.className = "card";

      var h3 = document.createElement("h3");
      h3.textContent = (ai+1) + ". " + alt.title;
      card.appendChild(h3);

      var sub = document.createElement("div");
      sub.className = "sub";
      sub.textContent = alt.sub;
      card.appendChild(sub);

      var lcd = document.createElement("div");
      lcd.className = "lcd";

      var canvas = document.createElement("canvas");
      canvas.width = 14 * PX;
      canvas.height = 12 * PX;
      canvas.style.width = (14 * PX) + "px";
      canvas.style.height = (12 * PX) + "px";
      lcd.appendChild(canvas);

      var lt = document.createElement("div");
      lt.className = "lt";
      var t = document.createElement("div");
      t.className = "t";
      t.textContent = state.name;
      lt.appendChild(t);
      var d = document.createElement("div");
      d.className = "d";
      d.textContent = alt.title;
      lt.appendChild(d);
      lcd.appendChild(lt);

      card.appendChild(lcd);

      var fi = document.createElement("div");
      fi.className = "fi";
      fi.textContent = "Frame 1/4";
      card.appendChild(fi);

      var ctrls = document.createElement("div");
      ctrls.className = "ctrls";

      var playBtn = document.createElement("button");
      playBtn.textContent = "Play";
      playBtn.className = "on";
      ctrls.appendChild(playBtn);

      var prevBtn = document.createElement("button");
      prevBtn.textContent = "<";
      ctrls.appendChild(prevBtn);

      var nextBtn = document.createElement("button");
      nextBtn.textContent = ">";
      ctrls.appendChild(nextBtn);

      card.appendChild(ctrls);
      row.appendChild(card);

      var animObj = {
        canvas: canvas,
        frames: alt.frames,
        frame: 0,
        playing: true,
        fi: fi,
        playBtn: playBtn
      };
      allAnimations.push(animObj);

      (function(ao, pb, prb, nxb) {
        pb.addEventListener("click", function() {
          ao.playing = !ao.playing;
          pb.classList.toggle("on", ao.playing);
          pb.textContent = ao.playing ? "Play" : "Stop";
        });
        prb.addEventListener("click", function() {
          ao.frame = (ao.frame - 1 + ao.frames.length) % ao.frames.length;
          drawFrame(ao);
        });
        nxb.addEventListener("click", function() {
          ao.frame = (ao.frame + 1) % ao.frames.length;
          drawFrame(ao);
        });
      })(animObj, playBtn, prevBtn, nextBtn);

      drawFrame(animObj);
    }
    content.appendChild(row);
  }
});

function drawFrame(ao) {
  var ctx = ao.canvas.getContext("2d");
  ctx.clearRect(0, 0, ao.canvas.width, ao.canvas.height);
  var frame = ao.frames[ao.frame];
  for (var y = 0; y < 12; y++) {
    var line = frame[y] || "";
    for (var x = 0; x < 14; x++) {
      if (line.charAt(x) === "#") {
        ctx.fillStyle = ON;
        ctx.fillRect(x * PX, y * PX, PX, PX);
      }
    }
  }
  ao.fi.textContent = "Frame " + (ao.frame + 1) + "/" + ao.frames.length;
}

setInterval(function() {
  for (var i = 0; i < allAnimations.length; i++) {
    var ao = allAnimations[i];
    if (ao.playing) {
      ao.frame = (ao.frame + 1) % ao.frames.length;
      drawFrame(ao);
    }
  }
}, 400);
</script>
</body>
</html>
